<!DOCTYPE html>
<html lang="es">
<link rel="icon" href="favicon.png" type="image/png">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monedas B2</title>

<style>

*{
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color: transparent;
  box-sizing:border-box;
}

body{
  margin:0;
  font-family: Arial;
  background: url("img/fondo.png") repeat;
  background-size:2000px 1500px;
  animation:fondoScroll 60s linear infinite;
  color:white;
  opacity:0;
  transition:.4s;
}

body.show{
  opacity:1;
}

@keyframes fondoScroll{
  from{background-position:0 0;}
  to{background-position:0 -1200px;}
}

/* Header */
header{
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
}

header img{
  max-width:90px;
  width:20%;
  object-fit:contain;
}

header h1{
  font-size:28px;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(9, 1fr);
  gap:18px;
  padding:25px;
}

.card{
  background:rgba(255,255,255,0.15);
  border-radius:16px;
  padding:10px;
  text-align:center;
  text-decoration:none;
  color:white;
  transition:.2s;
  height:210px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px rgba(255,255,255,.5);
}

.imgBox{
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CONTENEDOR DEL SACO */
.bolsa{
  position:relative;
  width:140px;
  height:140px;
}

.bolsa img{
  position:absolute;
  pointer-events:none;
}

/* saco base */
.saco{
  width:130px;
  left:5px;
  top:10px;
  z-index:1;
}

/* monedas dentro */
.monedaDentro{
  width:32px;
  z-index:2;
}

/* monedas del suelo */
.monedaSuelo{
  width:32px;
  z-index:3;
}

/* borde del saco */
.frenteSaco{
  width:130px;
  left:5px;
  top:10px;
  z-index:4;
}

.name{
  margin-top:6px;
  font-weight:bold;
  font-size:15px;
}

/* BOTON VOLVER */
.back{
  display:inline-block;
  margin:30px auto 40px;
  padding:14px 26px;
  background:rgba(255,255,255,.85);
  border-radius:30px;
  text-decoration:none;
  color:black;
  font-size:18px;
  transition:.2s;
}

.back:hover{
  background:white;
  transform:scale(1.05);
}

/* MOBILE */
@media(max-width:900px){
  .grid{
    grid-template-columns: repeat(4, 1fr);
  }
}

@media(max-width:600px){
  .grid{
    grid-template-columns: repeat(3, 1fr);
    gap:12px;
    padding:15px;
  }

  .card{
    height:230px;
  }

  .name{
    font-size:13px;
  }

}

</style>
</head>

<body>

<header>
  <img src="img/medallas.png">
  <h1>MONEDAS DISPONIBLES</h1>
</header>

<div class="grid">

<a class="card link" href="#">

<div class="imgBox">

<div class="bolsa">

<!-- SACO ATRAS -->
<img src="img/saco1.png" class="saco">

<!-- MONEDAS DENTRO -->

<img src="img/moneda1.png" class="monedaDentro" style="left:45px; top:21px;">
<img src="img/moneda2.png" class="monedaDentro" style="left:65px; top:21px;">


<!-- MONEDAS SUELO IZQUIERDA -->
<img src="img/moneda3.png" class="monedaSuelo" style="left:10px; bottom:12px;">
<img src="img/moneda1.png" class="monedaSuelo" style="left:-5px; bottom:5px;">
<img src="img/moneda2.png" class="monedaSuelo" style="left:15px; bottom:-2px;">


<!-- MONEDAS SUELO DERECHA -->
<img src="img/moneda2.png" class="monedaSuelo" style="left:55px; bottom:5px;">
<img src="img/moneda2.png" class="monedaSuelo" style="left:100px; bottom:5px;">
<img src="img/moneda3.png" class="monedaSuelo" style="left:90px; bottom:-12px;">

<!-- FRENTE SACO -->
<img src="img/frentesaco.png" class="frenteSaco">

</div>

</div>

<div class="name">Moneda Roja</div>

</a>

</div>

<center>
  <a class="back link" href="saga_blasters2.html.html">⬅ Volver al inicio</a>
</center>

<script>

window.onload = ()=>{
  document.body.classList.add("show");
};

document.querySelectorAll(".link").forEach(link=>{
  link.addEventListener("click", e=>{
    e.preventDefault();
    const url = link.href;
    document.body.classList.remove("show");
    setTimeout(()=>{
      window.location = url;
    },250);
  });
});

document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("contextmenu", e=> e.preventDefault());
  img.setAttribute("draggable","false");
});

</script>

</body>
</html>
